---

- name: __defaults__
  folds: 2
  cores: 2
  max_runtime_seconds: 600

# Classification: two binary tasks and one multiclass task.
- name: kc2_binary_classification
  openml_task_id: 3913
  metric: [auc, f1, acc, logloss]
  description: "Binary classification dataset from OpenML."

- name: iris_multiclass_classification
  openml_task_id: 59
  metric: [acc, f1, auc_ovr, logloss, balacc]
  description: "Small multiclass classification dataset from OpenML."

- name: credit_g_binary_classification
  openml_task_id: 31
  metric: [auc, f1, acc, logloss]
  description: "Binary credit scoring classification dataset from OpenML."

# Regression: three supervised regression tasks.
- name: cholesterol_regression
  openml_task_id: 2295
  metric: [rmse, r2, mae]
  description: "Regression dataset with numerical and categorical features."

- name: autoMpg_regression
  openml_task_id: 211864
  metric: [rmse, r2, mae]
  description: "Regression dataset for predicting miles per gallon."

- name: kin8nm_regression
  openml_task_id: 2280
  metric: [rmse, r2, mae]
  description: "Numeric regression dataset from OpenML."
